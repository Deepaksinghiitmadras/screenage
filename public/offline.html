<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Screenage</title>
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            background: #0b0f14; color: #e5e7eb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px;
        }
        .card { max-width: 360px; }
        h1 { font-size: 22px; margin: 12px 0 6px; color: #fff; }
        p { font-size: 14px; color: #9ca3af; line-height: 1.5; }
        .logo { font-size: 24px; font-weight: 700; color: #fff; }
        .logo span { color: #0FEDBE; }
        button {
            margin-top: 18px; background: #0FEDBE; color: #0b0f14; border: 0;
            padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📊 Screen<span>age</span></div>
        <h1>You're offline</h1>
        <p>Screenage needs a connection for live market data. Check your network and try again — pages you've already opened may still load.</p>
        <button onclick="location.reload()">Retry</button>
    </div>
</body>
</html>
